<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignPick — DESIGN.md 模板库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Onest:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Design<span>Pick</span></a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="heroSection">
    <h1>DESIGN.md 模板库</h1>
    <p>来自 awesome-design-md 社区。73 份设计系统规范，点击卡片查看完整设计语言。</p>
    <div class="hero-stats" id="heroStats"></div>
  </section>

  <!-- Category Tabs -->
  <div class="category-tabs" id="categoryTabs"></div>

  <!-- Grid View -->
  <div class="grid-container" id="gridView">
    <div class="template-grid" id="templateGrid"></div>
  </div>

  <!-- Detail View -->
  <div class="detail-container" id="detailView" style="display:none">
    <div class="detail-inner">
      <a href="#" class="back-link" id="backLink">← 返回</a>

      <div class="detail-preview" id="detailPreview"></div>

      <div class="detail-hero">
        <div class="detail-hero-slug" id="detailSlug"></div>
        <h1 id="detailName"></h1>
        <div class="detail-hero-meta">
          <span class="card-category" id="detailCategory"></span>
          <a id="detailSource" href="#" target="_blank" class="detail-source">源码 ↗</a>
        </div>
        <p class="detail-hero-desc" id="detailDesc"></p>
      </div>

      <div class="detail-content" id="detailContent"></div>

      <div class="detail-actions">
        <button class="btn btn-primary" id="downloadMd">下载 DESIGN.md</button>
        <button class="btn" id="copyMd">复制</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    Powered by <a href="https://github.com/VoltAgent/awesome-design-md">awesome-design-md</a> · Built with DesignPick
  </footer>

  <script src="js/markdown-renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
