<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignPick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Onest:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f6f7;
      --bg-elevated: #ffffff;
      --bg-recessed: #ededee;
      --ink: #1a1a1c;
      --ink-secondary: #5c5c60;
      --ink-muted: #8c8c91;
      --border: #dddde0;
      --border-hover: #b8b8bd;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 10px;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body: 'Onest', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .container { padding: 16px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--ink-muted); font-weight: 400; }
    .settings-toggle {
      font-size: 12px;
      color: var(--ink-muted);
      cursor: pointer;
      user-select: none;
    }
    .settings-toggle:hover { color: var(--ink); }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--ink);
      transition: all 150ms;
      font-family: var(--font-body);
    }
    .btn-primary {
      background: var(--ink);
      color: var(--bg-elevated);
      border-color: var(--ink);
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary:hover { border-color: var(--ink); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .extract-btn {
      width: 100%;
      text-align: center;
      margin-bottom: 8px;
      padding: 11px 16px;
      font-size: 14px;
    }
    .gallery-btn {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
      font-size: 12px;
      padding: 7px 16px;
    }

    /* Progress */
    .progress { margin-bottom: 16px; display: none; }
    .progress.visible { display: block; }
    .progress-bar {
      height: 3px;
      background: var(--bg-recessed);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--ink);
      border-radius: 2px;
      transition: width 300ms;
      width: 0%;
    }
    .progress-steps { margin-top: 10px; }
    .step {
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step.done { color: var(--ink-secondary); }
    .step.active { color: var(--ink); font-weight: 500; }

    /* Error */
    .error {
      color: #b91c1c;
      font-size: 12px;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-md);
      display: none;
    }
    .error.visible { display: block; }

    /* Result */
    .result { display: none; margin-bottom: 16px; }
    .result.visible { display: block; }

    /* Overview */
    .overview { margin-bottom: 16px; }
    .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .overview-item {
      padding: 8px 10px;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }
    .overview-label {
      font-size: 10px;
      color: var(--ink-muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .overview-value {
      font-size: 13px;
      font-weight: 600;
      word-break: break-all;
      margin-top: 2px;
    }
    .color-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .tab {
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: 1px solid transparent;
      color: var(--ink-muted);
      user-select: none;
      font-family: var(--font-body);
      transition: all 150ms;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      background: var(--ink);
      color: var(--bg-elevated);
      border-color: var(--ink);
    }
    .tab-content {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      overflow: auto;
      max-height: 400px;
    }
    .tab-content pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 12px;
      color: var(--ink-secondary);
    }
    .tab-content iframe { width: 100%; height: 380px; border: none; }

    /* Actions */
    .actions { display: flex; gap: 6px; margin-top: 12px; }

    /* Settings */
    .settings-panel { display: none; margin-top: 12px; }
    .settings-panel.visible { display: block; }
    .field { margin-bottom: 10px; }
    .field label {
      font-size: 11px;
      color: var(--ink-muted);
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .field input, .field select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg-elevated);
      outline: none;
      transition: border-color 150ms;
    }
    .field input:focus, .field select:focus { border-color: var(--ink); }
    .field select { cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">Design<span>Pick</span></div>
      <div class="settings-toggle" id="settingsToggle">⚙ 设置</div>
    </div>

    <!-- Extract button -->
    <button class="btn btn-primary extract-btn" id="extractBtn">提取当前页面设计系统</button>

    <!-- Gallery button -->
    <button class="btn btn-secondary gallery-btn" id="galleryBtn">浏览全部模板</button>

    <!-- Progress -->
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-steps" id="progressSteps"></div>
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

    <!-- Result -->
    <div class="result" id="result">
      <div class="overview">
        <div class="overview-grid" id="overviewGrid"></div>
      </div>
      <div class="tabs">
        <div class="tab active" data-tab="md" id="tabMd">DESIGN.md</div>
        <div class="tab" data-tab="preview" id="tabPreview">预览</div>
      </div>
      <div class="tab-content" id="tabContent">
        <pre id="mdContent"></pre>
      </div>
      <div class="actions">
        <button class="btn btn-secondary btn-sm" id="downloadMd">下载 .md</button>
        <button class="btn btn-secondary btn-sm" id="downloadHtml">下载 .html</button>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-panel" id="settingsPanel">
      <div class="field">
        <label>API Key（可选，用于 AI 增强）</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label>Base URL</label>
        <input id="baseUrl" value="https://api.openai.com">
      </div>
      <div class="field">
        <label>Model</label>
        <select id="model">
          <option value="gpt-4o-mini">GPT-4o-mini</option>
          <option value="gpt-4o">GPT-4o</option>
          <option value="deepseek-chat">DeepSeek Chat</option>
          <option value="glm-4-flash">智谱 GLM-4-flash</option>
          <option value="moonshot-v1-8k">Moonshot v1</option>
        </select>
      </div>
      <button class="btn btn-secondary btn-sm" id="saveSettings">保存设置</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
